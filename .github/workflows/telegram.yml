name: BTC Multi Indicator Alert v2

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore alert state cache
        id: restore-alert-state
        uses: actions/cache/restore@v4
        with:
          path: alert_state.json
          key: alert-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            alert-state-${{ github.ref_name }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python signal_bot.py

      - name: Save alert state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: alert_state.json
          key: alert-state-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
